name: Automated Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: TypeScript Check
      run: npm run type-check
    
    - name: ESLint
      run: npm run lint -- --max-warnings 0
    
    - name: Unit Tests
      run: npm run test:unit -- --run --reporter=verbose
    
    - name: Build
      run: npm run build:app
    
    - name: GUI Tests
      run: npm run test:gui -- --reporter=list
      env:
        CI: true
    
    - name: DevTools Audit
      run: |
        npm run dev:all &
        sleep 15
        npm run test:devtools -- --reporter=list
      env:
        CI: true
    
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-${{ matrix.node-version }}
        path: test-reports/
        retention-days: 7
    
    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.node-version }}
        path: playwright-report/
        retention-days: 7

  accessibility:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Run Accessibility Tests
      run: |
        npm run dev:all &
        sleep 15
        npm run test:gui -- tests/devtools-audit.spec.ts --reporter=list
      env:
        CI: true

  summary:
    runs-on: ubuntu-latest
    needs: [test, accessibility]
    if: always()
    
    steps:
    - name: Test Summary
      run: |
        echo "## Test Summary"
        echo ""
        echo "| Job | Status |"
        echo "|-----|--------|"
        echo "| Tests (${{ needs.test.result }}) | ${{ needs.test.result }} |"
        echo "| Accessibility (${{ needs.accessibility.result }}) | ${{ needs.accessibility.result }} |"
