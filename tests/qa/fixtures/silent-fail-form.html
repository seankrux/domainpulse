<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>Silent fail</title></head>
  <body>
    <h1>Contact</h1>
    <!-- This form accepts the submit but shows NO success message and never delivers. -->
    <form id="contact" action="#">
      <input id="name" name="name" type="text" />
      <input id="email" name="email" type="email" />
      <textarea id="msg" name="message"></textarea>
      <button type="submit">Send</button>
    </form>
    <script>
      document.getElementById('contact').addEventListener('submit', (e) => {
        e.preventDefault();
        // Intentionally do nothing visible — silent failure.
      });
    </script>
  </body>
</html>
